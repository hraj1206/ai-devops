services:
  - type: web_service
    name: ai-devops-groq-backend
    env: docker
    plan: free
    branch: main
    root: ./
    dockerfilePath: Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
    autoDeploy: true

  - type: static_site
    name: ai-devops-groq-frontend
    plan: free
    branch: main
    root: ./
    publishPath: ./
    autoDeploy: true
