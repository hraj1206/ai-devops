services:
  - type: web_service
    name: ai-devops-groq-backend
    env: python
    plan: free
    branch: main
    root: backend
    # Install from the backend requirements and run from the backend directory
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    # Add expected environment variables here (values set in Render dashboard)
    envVars:
      - key: GROQ_API_KEY
        value: ""
    autoDeploy: true